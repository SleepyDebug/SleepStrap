name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore .\SleepStrap\SleepStrap.csproj -p:Platform=x64

    - name: Build
      run: dotnet build .\SleepStrap\SleepStrap.csproj -c Release -p:Platform=x64 --no-restore

    - name: Publish
      run: dotnet publish -p:Platform=x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained true .\SleepStrap\SleepStrap.csproj

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SleepStrap (Release) (${{ github.sha }})
        path: .\SleepStrap\bin\x64\Release\net6.0-windows10.0.19041.0\win-x64\publish\*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/sleepstrap-')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SleepStrap (Release) (${{ github.sha }})
          path: release

      - name: Rename binaries
        run: mv release/SleepStrap.exe SleepStrap-${{ github.ref_name }}.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: SleepStrap-${{ github.ref_name }}.exe
          name: SleepStrap ${{ github.ref_name }}
          fail_on_unmatched_files: true

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SleepStrap (Release) (${{ github.sha }})
          path: release

      - name: Rename binaries
        run: mv release/SleepStrap.exe SleepStrap-${{ github.ref_name }}.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: SleepStrap-${{ github.ref_name }}.exe
          name: SleepStrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
